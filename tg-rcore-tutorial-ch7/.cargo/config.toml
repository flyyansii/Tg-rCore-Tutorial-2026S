[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
runner = [
    "qemu-system-riscv64",
    "-machine", "virt",
    "-display", "gtk",
    "-serial", "stdio",
    "-bios", "none",
    "-drive", "file=target/riscv64gc-unknown-none-elf/debug/fs.img,if=none,format=raw,id=x0",
    "-device", "virtio-blk-device,drive=x0,bus=virtio-mmio-bus.0",
    "-device", "virtio-gpu-device,bus=virtio-mmio-bus.1,xres=640,yres=360",
    "-device", "virtio-keyboard-device,bus=virtio-mmio-bus.2",
    "-kernel",
]

[env]
TG_USER_CRATE = "tg-rcore-tutorial-user"
TG_USER_LOCAL_DIR = "tg-rcore-tutorial-user"
TG_USER_DIR = 'C:\Users\FLY\Desktop\OS\Tg-rCore-Tutorial-2026S-git\tg-rcore-tutorial-user'
TG_USER_VERSION = "0.4.10"
CHAPTER = "pacman"
