# Default cross-compilation target: RISC-V 64 bare-metal.
[build]
target = "riscv64gc-unknown-none-elf"

# Local runner used by `cargo run`.
# For the snake feature this opens a QEMU GTK window with VirtIO GPU and keyboard.
# CI/test.sh overrides this runner with a headless command, so GitHub Actions will not
# wait for a local display server.
[target.riscv64gc-unknown-none-elf]
runner = [
    "qemu-system-riscv64",
    "-machine", "virt",
    "-display", "gtk",
    "-serial", "stdio",
    "-device", "virtio-gpu-device,bus=virtio-mmio-bus.0,xres=800,yres=480",
    "-device", "virtio-keyboard-device,bus=virtio-mmio-bus.1",
    "-bios", "none",
    "-kernel",
]

# Use the local user-mode crate from the repository instead of invoking cargo-clone.
[env]
TG_USER_CRATE     = "tg-rcore-tutorial-user"
TG_USER_LOCAL_DIR = "../tg-rcore-tutorial-user"
TG_USER_VERSION   = "0.4.10"
