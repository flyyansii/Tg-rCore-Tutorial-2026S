name: Sync GitHub to CNB (rebase)

on:
  push:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to CNB
        uses: docker://tencentcom/git-sync
        env:
          PLUGIN_TARGET_URL: https://cnb.cool/flyyansii/Tg-rCore-Tutorial-2026S
          PLUGIN_AUTH_TYPE: https
          PLUGIN_USERNAME: cnb
          PLUGIN_PASSWORD: ${{ secrets.CNB_TOKEN }}
          PLUGIN_SYNC_MODE: rebase
